
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading Analytics - Beta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #09090b;
            color: #fafafa;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 28px 32px;
            margin-bottom: 16px;
        }

        .header h1 {
            color: #fafafa;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            color: #6366f1;
        }

        .header p {
            color: #a1a1aa;
            font-size: 14px;
        }

        .stats-bar {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 20px 28px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            color: #71717a;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .stat-value {
            color: #fafafa;
            font-size: 24px;
            font-weight: 700;
        }

        .main-card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #a1a1aa;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: #fafafa;
            transition: all 0.2s;
        }

        select option {
            background: #18181b;
            color: #fafafa;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        input::placeholder {
            color: #52525b;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn:hover {
            background: #4f46e5;
        }

        .btn:disabled {
            background: #27272a;
            color: #52525b;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: #a1a1aa;
        }

        .spinner {
            border: 3px solid #27272a;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
            margin-top: 24px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #27272a;
        }

        .asset-info h2 {
            color: #fafafa;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .price {
            color: #6366f1;
            font-size: 18px;
            font-weight: 600;
        }

        .pattern-badge {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
        }

        .bullish {
            background: rgba(34,197,94,0.12);
            color: #22c55e;
            border: 1px solid rgba(34,197,94,0.3);
        }

        .bearish {
            background: rgba(239,68,68,0.12);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.3);
        }

        .confidence {
            color: #71717a;
            font-size: 13px;
            margin-top: 6px;
        }

        .analysis-section {
            background: #111114;
            border: 1px solid #27272a;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .analysis-section h3 {
            color: #6366f1;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .analysis-text {
            color: #a1a1aa;
            line-height: 1.8;
            white-space: pre-wrap;
            font-size: 14px;
        }

        .market-context {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .context-item {
            background: #111114;
            border: 1px solid #27272a;
            padding: 14px;
            border-radius: 8px;
        }

        .context-label {
            color: #71717a;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .context-value {
            color: #fafafa;
            font-weight: 600;
            font-size: 14px;
        }

        .error {
            background: rgba(239,68,68,0.1);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.2);
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
            display: none;
            font-size: 14px;
        }

        .success {
            background: rgba(34,197,94,0.1);
            color: #22c55e;
            border: 1px solid rgba(34,197,94,0.2);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>  AI Trading Analytics</h1>
            <p>Beta Version - AI-powered market pattern analysis</p>
        </div>
        
        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-label">Analyses Today</div>
                <div class="stat-value" id="analyses-today">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Remaining</div>
                <div class="stat-value" id="remaining">3</div>
            </div>
            <div class="stat">
                <div class="stat-label">Daily Limit</div>
                <div class="stat-value">3</div>
            </div>
        </div>
        
        <!-- Main Card -->
        <div class="main-card">
            <div class="success" id="success-msg"></div>
            
            <form id="analyze-form">
                <div class="form-group">
                    <label for="username">Your Name</label>
                    <input type="text" id="username" placeholder="Enter your name" required>
                </div>
                
                <div class="form-group">
                    <label for="asset">Select Asset</label>
                    <select id="asset" required>
                        <option value="">Choose an asset...</option>
                        <option value="BTC">BTC - Bitcoin</option>
                        <option value="ETH">ETH - Ethereum</option>
                        <option value="AAPL">AAPL - Apple Inc.</option>
                        <option value="NVDA">NVDA - NVIDIA Corp.</option>
                        <option value="TSLA">TSLA - Tesla Inc.</option>
                    </select>
                </div>
                
                <button type="submit" class="btn" id="analyze-btn">
                     Analyze Asset
                </button>
            </form>
            
            <!-- Loading -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing market patterns...</p>
            </div>
            
            <!-- Error -->
            <div class="error" id="error"></div>
            
            <!-- Results -->
            <div class="results" id="results">
                <div class="result-header">
                    <div class="asset-info">
                        <h2 id="result-symbol"></h2>
                        <div class="price" id="result-price"></div>
                    </div>
                    <div>
                        <div class="pattern-badge" id="pattern-badge"></div>
                        <div class="confidence" id="confidence"></div>
                    </div>
                </div>
                
                <div class="market-context" id="market-context"></div>
                
                <div class="analysis-section">
                    <h3> AI Analysis</h3>
                    <div class="analysis-text" id="analysis-text"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8000';
        
        const form = document.getElementById('analyze-form');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const error = document.getElementById('error');
        const successMsg = document.getElementById('success-msg');
        const analyzeBtn = document.getElementById('analyze-btn');
        
        // Update user stats
        async function updateStats(username) {
            try {
                const response = await fetch(`${API_URL}/stats/${username}`);
                const stats = await response.json();
                
                document.getElementById('analyses-today').textContent = stats.analyses_today;
                document.getElementById('remaining').textContent = stats.remaining_today;
            } catch (err) {
                console.error('Error fetching stats:', err);
            }
        }
        
        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const symbol = document.getElementById('asset').value;
            
            if (!username || !symbol) {
                showError('Please enter your name and select an asset');
                return;
            }
            
            // Show loading
            form.style.display = 'none';
            loading.style.display = 'block';
            results.style.display = 'none';
            error.style.display = 'none';
            successMsg.style.display = 'none';
            
            try {
                // Call API
                const response = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        symbol: symbol,
                        username: username
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data);
                    updateStats(username);
                } else {
                    showError(data.message || data.error);
                }
                
            } catch (err) {
                showError('Failed to connect to API. Make sure the server is running.');
            } finally {
                loading.style.display = 'none';
                form.style.display = 'block';
            }
        });
        
        function displayResults(data) {
            // Symbol and price
            document.getElementById('result-symbol').textContent = data.symbol;
            document.getElementById('result-price').textContent = `$${data.price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            
            // Pattern badge
            const badge = document.getElementById('pattern-badge');
            badge.textContent = data.pattern;
            badge.className = 'pattern-badge ' + (data.pattern.includes('BULLISH') ? 'bullish' : 'bearish');
            
            // Confidence
            document.getElementById('confidence').textContent = `Confidence: ${data.confidence.toFixed(1)}%`;
            
            // Market context
            const contextHtml = `
                <div class="context-item">
                    <div class="context-label">Asset Class</div>
                    <div class="context-value">${data.market_context.asset_class}</div>
                </div>
                <div class="context-item">
                    <div class="context-label">Recent Trend</div>
                    <div class="context-value">${data.market_context.recent_trend}</div>
                </div>
                <div class="context-item">
                    <div class="context-label">Volatility</div>
                    <div class="context-value">${data.market_context.volatility_regime}</div>
                </div>
            `;
            document.getElementById('market-context').innerHTML = contextHtml;
            
            // Analysis
            document.getElementById('analysis-text').textContent = data.analysis;
            
            // Show results
            results.style.display = 'block';
            
            // Show success message
            if (data.from_cache) {
                successMsg.textContent = ' Results loaded from cache (saved $0.006!)';
                successMsg.style.display = 'block';
            }
        }
        
        function showError(message) {
            error.textContent = '❌ ' + message;
            error.style.display = 'block';
            form.style.display = 'block';
        }
    </script>
</body>
</html>
